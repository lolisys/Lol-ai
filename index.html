<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selar AI Assistant 2026</title>
    <style>
        :root { --primary: #007bff; --secondary: #28a745; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-card { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        
        #display-area { height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid #eee; background: #fff; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }
        
        .img-container { margin-top: 10px; text-align: center; }
        #gen-image { max-width: 100%; border-radius: 10px; display: none; margin-top: 10px; border: 1px solid #ddd; }

        .input-box { padding: 15px; background: white; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; resize: none; font-family: inherit; margin-bottom: 10px; box-sizing: border-box; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-send { background: var(--primary); }
        .btn-draw { background: var(--secondary); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        .status-msg { font-size: 0.8rem; color: #666; text-align: center; margin-bottom: 10px; min-height: 1em; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header">Selar AI & Image Creator</div>
        
        <div id="display-area">
            <div class="bubble ai">Welcome! I am your updated Gemini 3 Assistant. I can write code or generate images for your Selar project. What should we do?</div>
        </div>

        <div class="input-box">
            <div id="status-text" class="status-msg"></div>
            <textarea id="user-input" rows="2" placeholder="Type a message or image description..."></textarea>
            <div class="actions">
                <button class="btn-send" onclick="runAI('chat')" id="btn-c">Send Chat</button>
                <button class="btn-draw" onclick="runAI('image')" id="btn-i">Draw Image</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Using the latest 2026 SDK from ESM
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const KEY = "AIzaSyB5JvE-0ETjD-gP-JQW64FLyCAfsL8yStQ";
        const genAI = new GoogleGenerativeAI(KEY);

        const display = document.getElementById('display-area');
        const input = document.getElementById('user-input');
        const status = document.getElementById('status-text');

        window.runAI = async (mode) => {
            const prompt = input.value.trim();
            if (!prompt) return;

            toggleUI(true);
            status.innerText = mode === 'chat' ? "AI is thinking..." : "Creating image (Nano Banana 2)...";

            try {
                if (mode === 'chat') {
                    addBubble(prompt, 'user');
                    input.value = '';

                    // NEW 2026 STABLE MODEL
                    const model = genAI.getGenerativeModel({ model: "gemini-3-flash" });
                    const result = await model.generateContent(prompt);
                    addBubble(result.response.text(), 'ai');
                } 
                else {
                    // IMAGE GENERATION MODEL (Nano Banana 2)
                    const imgModel = genAI.getGenerativeModel({ model: "gemini-3.1-flash-image-preview" });
                    const result = await imgModel.generateContent(prompt);
                    
                    const base64Data = result.response.candidates[0].content.parts[0].inlineData.data;
                    addImage(base64Data);
                }
                status.innerText = "Done!";
            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
                status.innerText = "Error occurred.";
            } finally {
                toggleUI(false);
            }
        };

        function addBubble(text, type) {
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerText = text;
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        }

        function addImage(base64) {
            const container = document.createElement('div');
            container.className = "img-container";
            const img = document.createElement('img');
            img.id = "gen-image";
            img.src = `data:image/png;base64,${base64}`;
            img.style.display = "inline-block";
            container.appendChild(img);
            display.appendChild(container);
            display.scrollTop = display.scrollHeight;
        }

        function toggleUI(loading) {
            document.getElementById('btn-c').disabled = loading;
            document.getElementById('btn-i').disabled = loading;
            input.disabled = loading;
        }
    </script>
</body>
</html>
