<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3 AI: Chat & Image Creator</title>
    <style>
        :root { --primary: #007bff; --secondary: #28a745; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; }
        
        #chat-box { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #eee; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--primary); color: white; }
        .ai { align-self: flex-start; background: #e9ecef; color: #333; }

        #image-result { min-height: 200px; display: flex; justify-content: center; align-items: center; padding: 15px; background: #fafafa; border-top: 2px dashed #ddd; }
        #generated-img { max-width: 100%; border-radius: 8px; display: none; }

        .controls { padding: 15px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        input { width: 90%; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; margin-bottom: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; color: white; min-width: 140px; }
        .btn-chat { background: var(--primary); }
        .btn-img { background: var(--secondary); }
        button:disabled { background: #ccc; }
        .loading { font-style: italic; color: #777; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>Gemini 3 AI Assistant</header>
        
        <div id="chat-box">
            <div class="msg ai">I am now updated to Gemini 3! Ask me anything or describe an image for me to create.</div>
        </div>

        <div id="image-result">
            <div id="img-status" class="loading">Images will appear here...</div>
            <img id="generated-img">
        </div>

        <div class="controls">
            <input type="text" id="user-input" placeholder="Enter message or image prompt...">
            <button class="btn-chat" onclick="handleAction('chat')" id="chat-btn">Send Message</button>
            <button class="btn-img" onclick="handleAction('image')" id="img-btn">Create Image</button>
        </div>
    </div>
