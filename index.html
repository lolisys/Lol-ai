<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selar AI - Gemini 3 Edition</title>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app { width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; }
        #log { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #eee; }
        .bubble { padding: 10px 14px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; max-width: 85%; }
        .user { align-self: flex-end; background: var(--primary); color: white; }
        .ai { align-self: flex-start; background: #e9ecef; color: #222; }
        .img-box { text-align: center; margin-top: 10px; }
        img { max-width: 100%; border-radius: 10px; border: 1px solid #ddd; }
        .input-area { padding: 15px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; box-sizing: border-box; }
        .btns { display: flex; gap: 8px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        #btn-c { background: #007bff; }
        #btn-i { background: #28a745; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">Selar AI Assistant (v3.1)</div>
    <div id="log">
        <div class="bubble ai">System Ready. I am now using Gemini 3.1 Stable. How can I help with your project?</div>
    </div>
    <div class="input-area">
        <textarea id="msg-in" rows="2" placeholder="Ask or describe an image..."></textarea>
        <div class="btns">
            <button id="btn-c" onclick="start('chat')">Send Chat</button>
            <button id="btn-i" onclick="start('image')">Draw Image</button>
        </div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const KEY = "AIzaSyB5JvE-0ETjD-gP-JQW64FLyCAfsL8yStQ";
    
    // FORCE V1 API VERSION TO AVOID 404
    const genAI = new GoogleGenerativeAI(KEY);

    window.start = async (mode) => {
        const input = document.getElementById('msg-in');
        const prompt = input.value.trim();
        if (!prompt) return;

        setLoading(true);
        try {
            if (mode === 'chat') {
                addBubble(prompt, 'user');
                input.value = '';

                // Using the latest 2026 Stable Flash model
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-3.1-flash-lite-preview" 
                }, { apiVersion: "v1" });

                const result = await model.generateContent(prompt);
                addBubble(result.response.text(), 'ai');
            } else {
                addBubble("Generating image... please wait.", 'ai');
                
                // Using Nano Banana 2 (3.1 Flash Image)
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-3.1-flash-image-preview" 
                }, { apiVersion: "v1" });

                const result = await model.generateContent(prompt);
                const data = result.response.candidates[0].content.parts[0].inlineData.data;
                showImg(data);
            }
        } catch (e) {
            alert("Connection Error: " + e.message);
            console.error(e);
        }
        setLoading(false);
    };

    function addBubble(txt, cls) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.className = `bubble ${cls}`;
        div.innerText = txt;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function showImg(base64) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.className = "img-box";
        div.innerHTML = `<img src="data:image/png;base64,${base64}">`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function setLoading(state) {
        document.getElementById('btn-c').disabled = state;
        document.getElementById('btn-i').disabled = state;
    }
</script>

</body>
</html>
