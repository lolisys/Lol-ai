<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selar Local AI (No Key)</title>
    <style>
        :root { --primary: #6f42c1; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #eee; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 0.9rem; max-width: 80%; }
        .user { align-self: flex-end; background: var(--primary); color: white; }
        .ai { align-self: flex-start; background: #e9ecef; color: #333; }
        .progress-bar { height: 5px; background: #eee; width: 100%; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        .controls { padding: 15px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .status { font-size: 0.75rem; color: #666; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">Selar Offline AI</div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="chat">
        <div class="msg ai">Initializing Local AI... Please wait for the initial download (approx. 200MB).</div>
    </div>
    <div class="controls">
        <div id="status" class="status">Waiting for engine...</div>
        <textarea id="input" rows="2" placeholder="Ask something (works offline!)" disabled></textarea>
        <button id="send-btn" onclick="chat()" disabled>Send Message</button>
    </div>
</div>

<script type="module">
    // Using WebLLM to run models locally via WebGPU
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    // We use a small, fast model: SmolLM2 (360M parameters)
    const modelId = "SmolLM2-360M-Instruct-q4f16_1-MLC";
    let engine;

    async function init() {
        const status = document.getElementById('status');
        const fill = document.getElementById('progress-fill');
        
        try {
            engine = await webllm.CreateMLCEngine(modelId, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    fill.style.width = `${report.progress * 100}%`;
                }
            });
            status.innerText = "Local AI Ready (Offline)";
            document.getElementById('input').disabled = false;
            document.getElementById('send-btn').disabled = false;
        } catch (e) {
            status.innerText = "Error: Your browser/phone may not support WebGPU.";
            console.error(e);
        }
    }

    window.chat = async () => {
        const input = document.getElementById('input');
        const prompt = input.value.trim();
        if (!prompt) return;

        addMsg(prompt, 'user');
        input.value = "";
        document.getElementById('send-btn').disabled = true;

        const messages = [{ role: "user", content: prompt }];
        const reply = await engine.chat.completions.create({ messages });
        
        addMsg(reply.choices[0].message.content, 'ai');
        document.getElementById('send-btn').disabled = false;
    };

    function addMsg(txt, cls) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${cls}`;
        div.innerText = txt;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    // Start loading as soon as page opens
    init();
</script>

</body>
</html>
